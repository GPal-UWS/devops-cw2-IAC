- name: Stage 1 - Launch EC2 Instance
  hosts: localhost
  connection: local
  # variables to be used in the playbook - making it easier to change values
  vars:
    instance_name: Running_API_App_Deployment
    key_name: running_api_app_deployment_key
    instance_type: t2.small
    security_group: running_api_app_deployment_sg
    image_id: ami-0866a3c8686eaeeba
    region: us-east-1

  tasks:
    - name: Launch T2 small instance on EC2
      ec2_instance:
        name: "{{ instance_name }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        security_group: "{{ security_group }}"
        image_id: "{{ image_id }}"
        region: "{{ region }}"
        state: started
        wait: yes
      register: running_api_app_deployment_instance

    - name: Add new instance to host group via its public IP address
      add_host:
        hostname: "{{ running_api_app_deployment_instance.instances[0].public_ip_address }}"
        groupname: ec2_deployment
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

    - name: Wait for SSH to come up
      wait_for:
        host: "{{ running_api_app_deployment_instance.instances[0].public_ip_address }}"
        port: 22
        delay: 20
        timeout: 320
        state: started

- name: Stage 2 - Install Docker on the new EC2 Instance
  hosts: ec2_deployment
  vars:
    remote_ec2_user: ubuntu
  remote_user: "{{ remote_ec2_user }}"
  become: yes
  become_method: sudo

  tasks:
    # --------- Install Docker on the deployment instance ---------
    - name: Add the Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Update apt packages and install docker-ce
      apt:
        name: docker-ce
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ remote_ec2_user }}"
        groups: docker
        append: yes
